<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Member Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080c;--s1:#0d0f15;--s2:#13161f;--s3:#1a1e2a;
  --border:#1e2333;--border2:#252c3d;
  --gold:#f0b429;--gold2:#ffd166;--goldfaint:rgba(240,180,41,0.08);
  --blue:#4f8ef7;--bluefaint:rgba(79,142,247,0.08);
  --green:#3ecf8e;--greenfaint:rgba(62,207,142,0.08);
  --red:#f05c5c;--redfaint:rgba(240,92,92,0.08);
  --purple:#a78bfa;--purplefaint:rgba(167,139,250,0.08);
  --text:#dde2f0;--muted:#5a6580;--muted2:#8a97b5;
}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--s1);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap;
}
.logo{font-family:Syne,sans-serif;font-size:16px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--gold);font-style:normal}
.logo span{font-weight:400;font-size:11px;color:var(--muted);margin-left:8px}
.header-right{font-size:11px;color:var(--muted)}

/* MONTH STRIP */
.month-strip{
  display:flex;align-items:center;gap:0;padding:0;
  background:var(--s1);border-bottom:1px solid var(--border);
  flex-direction:column;
}
.month-strip-row{
  display:flex;align-items:center;gap:4px;padding:8px 24px;width:100%;
  overflow-x:auto;
}
.month-strip-row+.month-strip-row{border-top:1px solid var(--border)}
.month-strip-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:8px;white-space:nowrap;flex-shrink:0}
.mtab{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;
  font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.mtab:hover{border-color:var(--muted2);color:var(--text)}
.mtab.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500}
.ytab{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;
  font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.ytab:hover{border-color:var(--muted2);color:var(--text)}
.ytab.on{background:var(--s3);border-color:var(--blue);color:var(--blue);font-weight:500}

/* VIEW TABS */
.view-tabs{
  display:flex;gap:0;background:var(--s1);
  border-bottom:1px solid var(--border);
}
.vtab{
  padding:11px 22px;font-size:12px;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Mono',monospace;
  white-space:nowrap;
}
.vtab:hover{color:var(--text)}
.vtab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* KPI BAR */
.kpi-bar{
  display:grid;grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid var(--border);
}
.kpi{
  padding:16px 20px;border-right:1px solid var(--border);
  background:var(--s1);
}
.kpi:last-child{border-right:none}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-val{font-family:Syne,sans-serif;font-size:21px;font-weight:700}
.kpi-sub{font-size:10px;color:var(--muted2);margin-top:2px}
.c-gold{color:var(--gold)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-purple{color:var(--purple)}

/* MAIN LAYOUT */
.main{padding:20px 24px;display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.full{grid-column:1/-1}

/* PANEL */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.ph-title{font-family:Syne,sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.ph-icon{font-size:16px}
.ph-sub{font-size:11px;color:var(--muted)}
.ph-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.ph-badge-gold{background:var(--goldfaint);color:var(--gold);border:1px solid rgba(240,180,41,0.2)}
.ph-badge-blue{background:var(--bluefaint);color:var(--blue);border:1px solid rgba(79,142,247,0.2)}
.ph-badge-red{background:var(--redfaint);color:var(--red);border:1px solid rgba(240,92,92,0.2)}
.ph-badge-green{background:var(--greenfaint);color:var(--green);border:1px solid rgba(62,207,142,0.2)}

/* MEMBER ROW */
.mrow{
  display:flex;align-items:center;gap:10px;padding:9px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--s2)}
.mrow-rank{font-size:11px;color:var(--muted);width:16px;text-align:right;flex-shrink:0}
.avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;font-family:Syne,sans-serif;
}
.av0{background:var(--goldfaint);color:var(--gold)}
.av1{background:var(--bluefaint);color:var(--blue)}
.av2{background:var(--greenfaint);color:var(--green)}
.av3{background:var(--purplefaint);color:var(--purple)}
.av4{background:var(--redfaint);color:var(--red)}
.mrow-info{flex:1;min-width:0}
.mrow-id{font-family:Syne,sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow-name{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.mrow-right{text-align:right;flex-shrink:0}
.mrow-amt{font-family:Syne,sans-serif;font-size:13px;font-weight:700}
.mrow-meta{font-size:10px;color:var(--muted);margin-top:2px}
.mrow-trend{font-size:10px;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-gold{background:var(--goldfaint);color:var(--gold);border:1px solid rgba(240,180,41,.2)}
.b-green{background:var(--greenfaint);color:var(--green);border:1px solid rgba(62,207,142,.2)}
.b-blue{background:var(--bluefaint);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
.b-red{background:var(--redfaint);color:var(--red);border:1px solid rgba(240,92,92,.2)}
.b-purple{background:var(--purplefaint);color:var(--purple);border:1px solid rgba(167,139,250,.2)}

/* BAR CHART */
.bar-section{padding:12px 16px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.brow:last-child{margin-bottom:0}
.brow-label{font-size:11px;color:var(--muted2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow-track{flex:1;height:20px;background:var(--s3);border-radius:3px;overflow:hidden;position:relative}
.brow-fill{height:100%;border-radius:3px;min-width:3px;transition:width .4s ease}
.brow-val{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:500;white-space:nowrap}

/* PROGRESS BAR */
.prog-row{padding:10px 16px;border-bottom:1px solid var(--border)}
.prog-row:last-child{border-bottom:none}
.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.prog-id{font-family:Syne,sans-serif;font-size:13px;font-weight:700}
.prog-pct{font-size:11px;color:var(--gold)}
.prog-sub{font-size:10px;color:var(--muted);margin-bottom:5px}
.prog-track{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px;transition:width .5s ease}

/* SPARKLINE (10-month mini chart in member detail) */
.sparkline{display:flex;align-items:flex-end;gap:3px;height:32px;margin-top:3px}
.spark-bar{border-radius:1px;min-width:4px;min-height:2px;flex:1}

/* EMPTY */
.empty{padding:24px 16px;text-align:center;font-size:12px;color:var(--muted)}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}
.modal{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:10px;width:680px;max-width:100%;max-height:88vh;
  overflow-y:auto;
}
.modal-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:20px 24px;border-bottom:1px solid var(--border);
}
.modal-id{font-family:Syne,sans-serif;font-size:22px;font-weight:800}
.modal-name{font-size:12px;color:var(--muted2);margin-top:3px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-kpi{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.modal-kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.modal-kpi-val{font-family:Syne,sans-serif;font-size:17px;font-weight:700}
.modal-chart{padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-chart-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.month-bars{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;align-items:end}
.mb-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.mb-bar-wrap{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:90px}
.mb-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.mb-label{font-size:9px;color:var(--muted);white-space:nowrap;transform:rotate(-40deg);margin-top:4px}
.mb-val{font-size:9px;color:var(--muted2);text-align:center;min-height:13px}
.modal-table{width:100%;border-collapse:collapse;margin:0 24px;width:calc(100% - 48px)}
.modal-table th{padding:7px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);text-align:right;background:var(--s2)}
.modal-table th:first-child{text-align:left}
.modal-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;font-size:12px}
.modal-table td:first-child{text-align:left;color:var(--muted2)}
.modal-table tr:last-child td{border-bottom:none}
.modal-table .row-active td{color:var(--text)}
.modal-note{margin:18px 24px;padding:12px 14px;border-radius:6px;font-size:12px;line-height:1.6}
.note-warn{background:var(--redfaint);border:1px solid rgba(240,92,92,.2);color:#ffaaaa}
.note-good{background:var(--greenfaint);border:1px solid rgba(62,207,142,.2);color:#7effc4}
.note-blue{background:var(--bluefaint);border:1px solid rgba(79,142,247,.2);color:#aac4ff}
.note-gold{background:var(--goldfaint);border:1px solid rgba(240,180,41,.2);color:#ffe299}
.note-neutral{background:var(--s2);border:1px solid var(--border2);color:var(--muted2)}

@media(max-width:900px){
  .kpi-bar{grid-template-columns:repeat(3,1fr)}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpi-bar{grid-template-columns:repeat(2,1fr)}
  .header{padding:10px 14px}
  .main{padding:12px 14px}
}

/* UPLOAD PANEL */
.upload-bar{
  display:grid;
  grid-template-columns:auto 1fr;
  grid-template-rows:auto auto;
  gap:8px 12px;
  padding:10px 24px;
  background:var(--s1);border-bottom:1px solid var(--border);
  align-items:center;
}
.upload-label{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;white-space:nowrap;
  grid-row:1;grid-column:1;
}
.upload-slots{
  display:flex;gap:8px;flex-wrap:wrap;
  grid-row:1;grid-column:2;
}
.upload-actions{
  display:flex;align-items:center;gap:10px;
  grid-row:2;grid-column:1/-1;
  padding-top:2px;
}
.upload-slot{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border:1px dashed var(--border2);border-radius:6px;cursor:pointer;
  background:var(--s2);transition:all .15s;
  flex:1;min-width:120px;max-width:200px;
}
.upload-slot:hover{border-color:var(--gold);background:var(--goldfaint)}
.upload-slot.ready{border-color:var(--green);border-style:solid;background:var(--greenfaint)}
.upload-slot.ready .us-icon{color:var(--green)}
.us-icon{font-size:16px;color:var(--muted)}
.us-text{flex:1;min-width:0}
.us-title{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.us-sub{font-size:10px;color:var(--muted);margin-top:1px}
.upload-slot input[type=file]{display:none}
.upload-btn{
  padding:6px 16px;background:var(--gold);color:#000;border:none;
  border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;
  font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;
}
.upload-btn:hover{opacity:.85}
.upload-btn:disabled{opacity:.4;cursor:not-allowed}
.upload-status{font-size:10px;color:var(--muted2)}

/* ── MEMBER CARD TABS ─────────────────────── */
.mc-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;gap:0;margin-top:4px}
.mc-tab{padding:9px 18px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.mc-tab:hover{color:var(--text)}
.mc-tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── LOG FEED ─────────────────────────────── */
.log-feed{padding:16px 24px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto}
.log-entry{display:flex;gap:10px;align-items:flex-start}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.log-dot-contact{background:var(--blue)}
.log-dot-gift{background:var(--gold)}
.log-dot-remark{background:var(--purple)}
.log-body{flex:1;min-width:0}
.log-text{font-size:12px;color:var(--text);line-height:1.5}
.log-meta{font-size:10px;color:var(--muted);margin-top:2px}
.log-empty{font-size:12px;color:var(--muted);padding:20px 24px;text-align:center}

/* ── ADD LOG FORM ─────────────────────────── */
.log-form{padding:12px 24px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.log-form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.log-select{
  padding:6px 10px;background:var(--s2);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;
}
.log-input{
  flex:1;padding:6px 10px;background:var(--s2);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  outline:none;min-width:0;
}
.log-input:focus{border-color:var(--gold)}
.log-input::placeholder{color:var(--muted)}
.log-submit{
  padding:6px 14px;background:var(--gold);color:#000;border:none;
  border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;
  font-weight:600;cursor:pointer;white-space:nowrap;
}
.log-submit:hover{opacity:.85}
.log-submit:disabled{opacity:.4;cursor:not-allowed}
.log-delete{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:13px;padding:0 4px;line-height:1;transition:color .15s;
}
.log-delete:hover{color:var(--red)}

/* BRAND BADGES */
.b-mgbmy{background:rgba(79,142,247,0.15);color:#4f8ef7;border:1px solid rgba(79,142,247,0.3)}
.b-mgbsg{background:rgba(240,180,41,0.15);color:#f0b429;border:1px solid rgba(240,180,41,0.3)}
.b-mbs{background:rgba(62,207,142,0.15);color:#3ecf8e;border:1px solid rgba(62,207,142,0.3)}
.b-gfw{background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3)}
.b-pgb{background:rgba(240,92,92,0.15);color:#f05c5c;border:1px solid rgba(240,92,92,0.3)}
.b-b1{background:rgba(90,101,128,0.15);color:#8a97b5;border:1px solid rgba(90,101,128,0.3)}
.brand-filter-bar{display:flex;gap:6px;padding:8px 24px;background:var(--s1);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.brand-filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.bftab{padding:4px 12px;border-radius:12px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;border:1px solid var(--border2);background:transparent;color:var(--muted2)}
.bftab:hover{color:var(--text)}
.bftab.on{font-weight:600}
.bftab-all.on{background:var(--s3);border-color:var(--muted2);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><em>VIP</em> MEMBER REPORT<span>FTD & Monthly Deposit Dashboard</span></div>
  <div class="header-right">Data: 2026-05-05 · Paste new Excel data to refresh</div>
</div>


<div class="upload-bar">
  <div class="upload-label">Update Data</div>
  <div class="upload-slots">
    <label class="upload-slot" id="slotReport">
      <input type="file" id="fileReport" accept=".xlsx,.xls" onchange="handleFile('report',this)">
      <div class="us-icon" id="iconReport">📊</div>
      <div class="us-text">
        <div class="us-title" id="titleReport">BOT Player Report</div>
        <div class="us-sub" id="subReport">All brand tabs</div>
      </div>
    </label>
    <label class="upload-slot" id="slotJibetsReport">
      <input type="file" id="fileJibetsReport" accept=".xlsx,.xls" onchange="handleFile('jibetsreport',this)">
      <div class="us-icon" id="iconJibetsReport">📋</div>
      <div class="us-text">
        <div class="us-title" id="titleJibetsReport">JIBETS Player Report</div>
        <div class="us-sub" id="subJibetsReport">All_Members .xlsx</div>
      </div>
    </label>
    <label class="upload-slot" id="slotDeposit">
      <input type="file" id="fileDeposit" accept=".xlsx,.xls" onchange="handleFile('deposit',this)">
      <div class="us-icon" id="iconDeposit">💰</div>
      <div class="us-text">
        <div class="us-title" id="titleDeposit">JIBETS Deposit</div>
        <div class="us-sub" id="subDeposit">Login ID format</div>
      </div>
    </label>
    <label class="upload-slot" id="slotWithdrawal">
      <input type="file" id="fileWithdrawal" accept=".xlsx,.xls" onchange="handleFile('withdrawal',this)">
      <div class="us-icon" id="iconWithdrawal">🏧</div>
      <div class="us-text">
        <div class="us-title" id="titleWithdrawal">JIBETS Withdrawal</div>
        <div class="us-sub" id="subWithdrawal">Login ID format</div>
      </div>
    </label>
    <label class="upload-slot" id="slotDepositBot">
      <input type="file" id="fileDepositBot" accept=".xlsx,.xls" onchange="handleFile('depositbot',this)">
      <div class="us-icon" id="iconDepositBot">💰</div>
      <div class="us-text">
        <div class="us-title" id="titleDepositBot">BOT Deposit</div>
        <div class="us-sub" id="subDepositBot">Member ID format</div>
      </div>

// ── HELPERS ──────────────────────────────────────────────────
// Brand badge helper
function brandBadge(brand) {
  const map = {
    'MGBMY': ['b-mgbmy','MGBMY'],
    'MGBSG': ['b-mgbsg','MGBSG'],
    'MBS':   ['b-mbs',  'MBS'],
    'GFW':   ['b-gfw',  'GFW'],
    'PGB':   ['b-pgb',  'PGB'],
    'B1':    ['b-b1',   'JIBETS'],
  };
  const [cls, label] = map[brand] || ['b-b1','—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

const myr=v=>{
  if(!v||v===0)return'—';
  if(v>=1000000)return'MYR '+(v/1000000).toFixed(2)+'M';
  if(v>=100000)return'MYR '+(v/1000).toFixed(0)+'K';
  if(v>=1000)return'MYR '+(v/1000).toFixed(1)+'K';
  return'MYR '+Math.round(v).toLocaleString();
};
const avCls=id=>['av0','av1','av2','av3','av4'][id.charCodeAt(0)%5];
const initials=id=>id.substring(0,2).toUpperCase();
const pct=(a,b)=>b>0?Math.round(((a-b)/b)*100):null;

function trendHTML(cur,prv){
  if(prv<=0&&cur>0)return`<span class="badge b-blue" style="margin-top:2px">New</span>`;
  if(cur<=0&&prv>0)return`<span class="badge b-red" style="margin-top:2px">Gone quiet</span>`;
  const p=pct(cur,prv);
  if(p===null||cur===0)return'';
  if(p>=50)return`<div class="mrow-trend up">↑ ${p}% vs prev month</div>`;
  if(p>0)return`<div class="mrow-trend up">↑ ${p}% vs prev</div>`;
  if(p<0)return`<div class="mrow-trend down">↓ ${Math.abs(p)}% vs prev</div>`;
  return`<div class="mrow-trend flat">Same as prev month</div>`;
}

function sparkHTML(m){
  const max=Math.max(...m.a,1);
  return m.a.map((v,i)=>{
    const h=Math.max(2,Math.round((v/max)*32));
    const bg=i===9?'var(--gold)':i===8?'var(--blue)':'var(--border2)';
    return`<div class="spark-bar" style="height:${h}px;background:${bg}"></div>`;
  }).join('');
}

function mrowHTML(m,mi,rank,showTot=false){
  const cur=m.a[mi], prv=mi>0?m.a[mi-1]:0;
  const val=showTot?m.tot:cur;
  const isVIP=m.tot>=VIP;
  return`<div class="mrow" onclick="openModal('${m.id}')">
    <div class="mrow-rank">${rank||''}</div>
    <div class="avatar ${avCls(m.id)}">${initials(m.id)}</div>
    <div class="mrow-info">
      <div class="mrow-id">${m.id} ${isVIP?'<span class="badge b-gold">VIP</span>':''}</div>
      <div class="mrow-name">${m.name}</div>
      <div class="sparkline">${sparkHTML(m)}</div>
    </div>
    <div class="mrow-right">
      <div class="mrow-amt ${isVIP?'c-gold':''}">${myr(val)}</div>
      <div class="mrow-meta">${trendHTML(cur,prv)}</div>
    </div>
  </div>`;
}

function barHTML(m,mi,maxVal,showTot=false){
  const val=showTot?m.tot:m.a[mi];
  const isVIP=m.tot>=VIP;
  const fillPct=maxVal>0?Math.max(2,Math.round((val/maxVal)*100)):2;
  const bg=isVIP?'rgba(240,180,41,0.25)':'rgba(79,142,247,0.2)';
  const textCol=isVIP?'var(--gold)':'var(--blue)';
  return`<div class="brow">
    <div class="brow-label" title="${m.id}">${m.id}</div>
    <div class="brow-track">
      <div class="brow-fill" style="width:${fillPct}%;background:${bg}"></div>
      <div class="brow-val" style="color:${textCol}">${myr(val)}</div>
    </div>
  </div>`;
}

function filteredMembers() {

  if (selBrand === 'JIBETS_MY') return MEMBERS.filter(m => m.brand==='JIBETS_MY' || m.brand==='JIBETS');
  return MEMBERS.filter(m => m.brand === selBrand);
}

// ── YEAR / MONTH PICKER ───────────────────────────────────────
const ALL_YEARS=[2025,2026,2027,2028,2029,2030];
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let selYear=null; // null = auto (year of selMi)

function getSelYear(){
  if(selYear!==null)return selYear;
  const ym=MONTHS[selMi]||MONTHS[MONTHS.length-1]||'2026-01';
  return parseInt(ym.slice(0,4));
}

function buildYearTabs(){
  const yr=getSelYear();
  document.getElementById('yearTabs').innerHTML=
    ALL_YEARS.map(y=>`<button class="ytab${y===yr?' on':''}" onclick="pickYear(${y})">${y}</button>`).join('');
}

function buildMonthTabs(){
  const yr=getSelYear();
  // Show all 12 months for selected year; highlight if exists in data
  const tabsHtml = MONTH_NAMES.map((mName,i)=>{
    const key=yr+'-'+('0'+(i+1)).slice(-2);
    const idx=MONTHS.indexOf(key);
    const exists=idx>=0;
    const isOn=idx===selMi;
    const style=!exists?'opacity:.3;cursor:not-allowed':'';
    return`<button class="mtab${isOn?' on':''}" style="${style}"
      onclick="${exists?`selYear=null;selMi=${idx};render()`:''}"
      ${!exists?'disabled':''}>${mName}</button>`;
  }).join('');
  document.getElementById('monthTabs').innerHTML=tabsHtml;
}

function pickYear(y){
  selYear=y;
  // Try to keep same month number, else pick first available month in that year
  const curMonth=MONTHS[selMi]?MONTHS[selMi].slice(5,7):'01';
  const preferred=y+'-'+curMonth;
  const prefIdx=MONTHS.indexOf(preferred);
  if(prefIdx>=0){ selMi=prefIdx; selYear=null; }
  // else just re-render with year selected — month buttons update, no selMi change
  render();
}

function buildTabs(){
  buildYearTabs();
  buildMonthTabs();
}

function setView(v,el){
  selView=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render();
}

  const goneQuiet=mi>0?MEMBERS.filter(m=>m.a[mi-1]>0&&m.a[mi]===0):[];

  document.getElementById('kpiBar').innerHTML=`
    <div class="kpi">
      <div class="kpi-label">Deposits ${ML[mi]}</div>

      <div class="kpi-label">Active this month</div>
      <div class="kpi-val c-blue">${active.length}</div>
      <div class="kpi-sub">${mi>0?prev.length+' active last month':'—'}</div>

}

function viewOverview(mi){
  // Per-brand breakdown
  const BRANDS = [
    {key:'JIBETS_MY', label:'JIBETS MY', cls:'b-b1'},
    {key:'JIBETS_SG', label:'JIBETS SG', cls:'b-b1'},
    {key:'MGBMY',     label:'MGBMY',     cls:'b-mgbmy'},
    {key:'MGBSG',     label:'MGBSG',     cls:'b-mgbsg'},
    {key:'MBS',       label:'MBS',       cls:'b-mbs'},
    {key:'GFW',       label:'GFW',       cls:'b-gfw'},
    {key:'PGB',       label:'PGB',       cls:'b-pgb'},
  ];

  function brandMembers(key) {
    if (key==='JIBETS_MY') return MEMBERS.filter(m=>m.brand==='JIBETS_MY'||m.brand==='JIBETS');
    return MEMBERS.filter(m=>m.brand===key);
  }

  const brandRows = BRANDS.map(function(b) {
    const bm       = brandMembers(b.key);
    const dep      = bm.reduce((s,m)=>s+(m.a[mi]||0),0);
    const wd       = bm.reduce((s,m)=>s+(m.w[mi]||0),0);
    const net      = dep - wd;
    const active   = bm.filter(m=>m.a[mi]>0).length;
    const total    = bm.length;
    const prevDep  = mi>0 ? bm.reduce((s,m)=>s+(m.a[mi-1]||0),0) : 0;
    const chg      = prevDep>0 ? Math.round(((dep-prevDep)/prevDep)*100) : null;
    const chgHtml  = chg===null ? '<span style="color:var(--muted)">—</span>'
                   : chg>=0 ? '<span style="color:var(--green)">↑'+chg+'%</span>'
                   : '<span style="color:var(--red)">↓'+Math.abs(chg)+'%</span>';
    const netCol   = net>=0?'var(--red)':'var(--green)';
    return '<tr onclick="setBrandAndRender(\"'+b.key+'\")" style="cursor:pointer">'
      +'<td><span class="badge '+b.cls+'">'+b.label+'</span></td>'
      +'<td style="text-align:right;font-family:Syne,sans-serif;font-weight:700;color:var(--blue)">'+myr(dep)+'</td>'

  return`

              <th style="padding:9px 16px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;text-align:right">Net (Dep−Wd)</th>
              <th style="padding:9px 16px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;text-align:center">vs Prev Month</th>
              <th style="padding:9px 16px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;text-align:center">Active / Total</th>
            </tr>
          </thead>
          <tbody>${brandRows}</tbody>
          <tfoot>
            <tr style="background:var(--s2);font-weight:700;border-top:2px solid var(--border2)">
              <td style="padding:10px 16px;font-family:Syne,sans-serif">TOTAL</td>

              <td style="padding:10px 16px;text-align:right;color:var(--purple)">${myr(allWd)}</td>
              <td style="padding:10px 16px;text-align:right;font-weight:700;color:${allNet>=0?'var(--red)':'var(--green)'}">${allNet>=0?'+':''}${myr(allNet)}</td>
              <td></td>

          </tfoot>

    </div>

  <div class="panel">
    <div class="ph">

    <div class="bar-section">
      ${topDep.length?topDep.map(m=>barHTML(m,mi,maxAmt)).join(''):'<div class="empty">No deposits this month</div>'}
    </div>

  </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
      ${rising.length?rising.map(m=>mrowHTML(m,mi,null)).join(''):'<div class="empty">No strong risers this month</div>'}
    </div>
  </div>`;
}

// Click brand row in overview to filter to that brand
function setBrandAndRender(brand) {
  selBrand = brand;
  document.querySelectorAll('.bftab').forEach(b=>b.classList.remove('on'));
  // Try to highlight matching button
  document.querySelectorAll('.bftab').forEach(function(b){
    if(b.textContent.trim().replace(' ','_')===brand||b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+brand+"'"))
      b.classList.add('on');
  });
  selView='overview';
  document.querySelectorAll('.vtab').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.vtab')[0].classList.add('on');
  render();
}

function viewVIP(mi){
  const vips=filteredMembers().filter(m=>m.tot>=VIP).sort((a,b)=>b.tot-a.tot);
  const maxTot=vips[0]?vips[0].tot:1;
  const activeVips=vips.filter(m=>m.a[mi]>0);
  const quietVips=vips.filter(m=>m.a[mi]===0);

  return`
  <div class="full">
    <div class="panel">
      <div class="ph">
        <div class="ph-title">⭐ VIP Leaderboard — lifetime total</div>
        <div class="ph-sub">All members ≥ MYR 50K · gold = VIP active · grey = quiet this month</div>
      </div>
      <div class="bar-section">
        ${vips.map(m=>{
          const isActive=m.a[mi]>0;
          const fillPct=Math.max(2,Math.round((m.tot/maxTot)*100));

function viewPotential(mi){
  const nonVip=filteredMembers().filter(m=>m.tot<VIP&&m.ftdM!=='No Deposit');

  const maxHS=highSpend[0]?highSpend[0].a[mi]:1;

  const closeToVip=nonVip.filter(m=>m.tot>=VIP*0.4).sort((a,b)=>b.tot-a.tot).slice(0,8);
  const rising=mi>0?nonVip.filter(m=>m.a[mi]>0&&m.a[mi-1]>0&&m.a[mi]>=m.a[mi-1]*1.5).sort((a,b)=>b.a[mi]-a.a[mi]).slice(0,8):[];

  return`

    <div class="panel">
      <div class="ph">
        <div class="ph-title">💎 High-spend non-VIPs — ${ML[mi]}</div>

      </div>
      <div class="bar-section">

      </div>
    </div>
  </div>
  <div class="panel">
    <div class="ph">
      <div class="ph-title">🏆 Closest to VIP status</div>

function viewAllDepositors(mi){
  const deposited = filteredMembers().filter(m=>m.a[mi]>0).sort((a,b)=>b.a[mi]-a.a[mi]);
  const totalAmt  = deposited.reduce((s,m)=>s+m.a[mi],0);
  const totalCnt  = deposited.reduce((s,m)=>s+m.c[mi],0);

  const rows = deposited.map((m,i)=>{
    const isVIP = m.tot>=VIP;
    const avg   = m.c[mi]>0?(m.a[mi]/m.c[mi]):0;
    const prv   = mi>0?m.a[mi-1]:0;
    const diff  = prv>0?Math.round(((m.a[mi]-prv)/prv)*100):null;
    const diffHtml = diff===null?'—':diff>0?`<span style="color:var(--green)">↑${diff}%</span>`
                    :diff<0?`<span style="color:var(--red)">↓${Math.abs(diff)}%</span>`

      </td>
      <td style="text-align:right;font-family:Syne,sans-serif;font-weight:700;color:${isVIP?'var(--gold)':'var(--blue)'}">MYR ${m.a[mi].toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>

      <td style="text-align:right;color:var(--muted2)">MYR ${avg.toFixed(2)}</td>
      <td style="text-align:center">${diffHtml}</td>

function viewWinLoss(mi){
  // Gather all members who had any activity (dep or wd) this month
  const active = filteredMembers().filter(m=>(m.a[mi]>0)||(m.w&&m.w[mi]>0))
    .sort((a,b)=>{
      // Sort by W/L: biggest losers (member lost most) first
      const wlA = a.wl?a.wl[mi]:a.a[mi];
      const wlB = b.wl?b.wl[mi]:b.a[mi];
      return wlB - wlA;
    });

  const totalDep = active.reduce((s,m)=>s+m.a[mi],0);
  const totalWd  = active.reduce((s,m)=>s+(m.w?m.w[mi]:0),0);
  const totalWL  = totalDep - totalWd; // positive = house won overall

  const lifetimeDep = filteredMembers().reduce((s,m)=>s+m.tot,0);

// Load all logs for a member
// ── LOGS — reads from feedback/{memberId}.entries (same as old app) ──────
async function loadLogs(memberId) {
  const db = getDB();
  if (!db) {
    ['remarks','contacts','gifts'].forEach(type => {
      const el = document.getElementById('feed-' + type + '-' + memberId);
      if (el) el.innerHTML = '<div class="log-empty">Firebase not connected</div>';
    });
    return;
  }
  try {
    // Try original case first, then uppercase, then lowercase
    // Old app may store as BOTKK133, botkk133, or mixed
    let doc = await db.collection('feedback').doc(memberId).get();
    if (!doc.exists) doc = await db.collection('feedback').doc(memberId.toUpperCase()).get();
    if (!doc.exists) doc = await db.collection('feedback').doc(memberId.toLowerCase()).get();

    const entries = (doc.exists && doc.data().entries) ? doc.data().entries : [];

    // Also load notes (old app stores as .notes string)
    const notes = (doc.exists && doc.data().notes) ? doc.data().notes : '';

    // Separate entries by type — map old app type names to new tab names
    // Old app used: 'call', 'tg', 'note' → contact/remark
    // Old app used: 'gifts', 'gift' → gift
    // Old app used: 'remark', 'note', undefined → remark
    const TYPE_MAP = {
      'call':    'contact',
      'tg':      'contact',
      'telegram':'contact',
      'whatsapp':'contact',
      'contact': 'contact',
      'gift':    'gift',
      'gifts':   'gift',
      'remark':  'remark',
      'note':    'remark',
    };
    const byType = { remark: [], contact: [], gift: [] };
    entries.forEach(function(e, idx) {
      const raw = (e.type || 'remark').toLowerCase();
      const t   = TYPE_MAP[raw] || 'remark';
      byType[t].push({...e, _idx: idx});
    });
    // Also push old notes as a remark if present
    if (notes) byType.remark.unshift({text: notes, ts: null, by: '', _idx: -1, _isNote: true});

    ['remark','contact','gift'].forEach(function(type) {
      const feedEl = document.getElementById('feed-' + type + 's-' + memberId);
      if (!feedEl) return;
      const list = byType[type].slice().reverse(); // newest first
      if (!list.length) {
        feedEl.innerHTML = '<div class="log-empty">No ' + type + 's yet</div>';
        return;
      }
      feedEl.innerHTML = list.map(function(e) {
        const dotCls = 'log-dot-' + type;
        let tsStr = '—';
        if (e.ts) {
          let d;
          if (e.ts.seconds) d = new Date(e.ts.seconds*1000);         // Firestore Timestamp
          else if (e.ts.toDate) d = e.ts.toDate();                    // Firestore Timestamp object
          else if (typeof e.ts === 'number') d = new Date(e.ts);      // Unix ms
          else d = new Date(e.ts);                                     // ISO string
          if (d && !isNaN(d.getTime()))
            tsStr = d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
        }
        let label = '';
        if (type === 'contact') {
          // Use method field, or fall back to original type (call, tg, etc.)
          const method = e.method || e.type || 'Call';
          const methodDisplay = method==='tg'?'Telegram':method==='call'?'Call':method;
          label = '<span style="color:var(--blue);margin-right:6px">' + methodDisplay + '</span>';
        }
        if (type === 'gift') label = '<span style="color:var(--gold);margin-right:6px">' + (e.giftType||e.type||'Gift') + (e.value?' · '+e.value:'') + '</span>';
        const delBtn = e._isNote ? '' : '<button class="log-delete" title="Delete" onclick="deleteLog(\''+memberId+'\','+e._idx+')">✕</button>';
        return '<div class="log-entry">'
          + '<div class="log-dot '+dotCls+'"></div>'
          + '<div class="log-body">'
          + '<div class="log-text">'+label+(e.text||'')+'</div>'
          + '<div class="log-meta">'+tsStr+(e.by?' · '+e.by:'')+'</div>'
          + '</div>'
          + delBtn
          + '</div>';
      }).join('');
    });
  } catch(e) {
    console.error('loadLogs error:', e);
    ['remarks','contacts','gifts'].forEach(function(type) {
      const el = document.getElementById('feed-' + type + '-' + memberId);
      if (el) el.innerHTML = '<div class="log-empty">Error: ' + e.message + '</div>';
    });
  }
}

// Add a log entry — saves into feedback/{memberId}.entries array
async function addLog(type, memberId) {
  const db = getDB();
  if (!db) { alert('Firebase not connected'); return; }

  const textEl = document.getElementById('inp-' + type + '-' + memberId);
  const text   = textEl ? textEl.value.trim() : '';
  if (!text) { if (textEl) textEl.focus(); return; }

  const btn = document.querySelector('button[onclick="addLog(\''+type+'\',\''+memberId+'\')"]');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }

  const entry = {
    type, text,
    ts: new Date().toISOString(),
    by: 'Staff'
  };
  if (type === 'contact') {
    const sel = document.getElementById('sel-contact-' + memberId);
    entry.method = sel ? sel.value : 'Call';
  }
  if (type === 'gift') {
    const selType = document.getElementById('sel-gift-type-' + memberId);
    const valEl   = document.getElementById('inp-gift-val-' + memberId);
    entry.giftType = selType ? selType.value : 'Other';
    entry.value    = valEl ? valEl.value.trim() : '';
  }

  try {
    // Find the correct doc ID (check which case exists)
    let docId = memberId;
    let snap  = await db.collection('feedback').doc(memberId).get();
    if (!snap.exists) {
      const upper = await db.collection('feedback').doc(memberId.toUpperCase()).get();
      if (upper.exists) { docId = memberId.toUpperCase(); snap = upper; }
      else {
        const lower = await db.collection('feedback').doc(memberId.toLowerCase()).get();
        if (lower.exists) { docId = memberId.toLowerCase(); snap = lower; }
      }
    }
    const ref = db.collection('feedback').doc(docId);
    const existing = snap.exists ? (snap.data().entries || []) : [];
    existing.push(entry);
    await ref.set({ entries: existing }, { merge: true });

    if (textEl) textEl.value = '';
    if (type === 'gift') {
      const valEl = document.getElementById('inp-gift-val-' + memberId);
      if (valEl) valEl.value = '';
    }
    await loadLogs(memberId);
  } catch(e) {
    alert('Error saving: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = type==='remark'?'Save':type==='contact'?'Log':'Add'; }
  }
}

// Delete a log entry by index
async function deleteLog(memberId, idx) {
  if (!confirm('Delete this entry?')) return;
  const db = getDB();
  if (!db) return;
  try {
    let docId2 = memberId;
    let snapD  = await db.collection('feedback').doc(memberId).get();
    if (!snapD.exists) {
      const upper = await db.collection('feedback').doc(memberId.toUpperCase()).get();
      if (upper.exists) docId2 = memberId.toUpperCase();
      else {
        const lower = await db.collection('feedback').doc(memberId.toLowerCase()).get();
        if (lower.exists) docId2 = memberId.toLowerCase();
      }
    }
    const ref  = db.collection('feedback').doc(docId2);
    const snapFinal = await ref.get();
    const entries = snapFinal.exists ? (snapFinal.data().entries || []) : [];
    entries.splice(idx, 1);
    await ref.set({ entries }, { merge: true });
    await loadLogs(memberId);
  } catch(e) { alert('Error: ' + e.message); }
}

let _vipWB = null;

function handleVipFile(input) {

async function syncVipList() {
  const btn = document.getElementById('vipSyncBtn');
  if (!_vipWB) {
    // trigger file pick
    document.getElementById('fileVipList').click();
    return;
  }
  if (btn) { btn.textContent = 'Syncing...'; btn.disabled = true; }
  try {
    // Find VIP List sheet tab
    const sheetName = _vipWB.SheetNames.find(s => s.toLowerCase().includes('vip')) || _vipWB.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(_vipWB.Sheets[sheetName], {defval:''});
    // Find header row (skip blank rows at top)
    const dataRows = rows.filter(r => r['Member ID'] || r['member id'] || Object.values(r).some(v => String(v).startsWith('BOT')));
    const csv = dataRows.map(r => JSON.stringify(r)).join('\n');
    const BRAND_MAP = {'MGB':'MGBMY','GFW':'GFW','MBS':'MBS','PGB':'PGB'};
    let updated = 0;

    dataRows.forEach(function(row) {
      const region   = String(row['Region']||'').trim();
      const brand    = String(row['Brand']||'').trim();
      const memberId = String(row['Member ID']||'').trim();
      const name     = String(row['Name']||'').trim();
      const tier     = String(row['Tier']||'').trim();
      const totDep   = parseFloat(String(row['Total Deposit']||'0').replace(/[^0-9.]/g,''))||0;
      const totWd    = parseFloat(String(row['Total Withdrawal']||'0').replace(/[^0-9.]/g,''))||0;

      if (!memberId || memberId === '#N/A') return;

      // Determine brand tag
      let brandTag = 'MGBMY';
      if (brand === 'GFW') brandTag = 'GFW';
      else if (brand === 'MBS') brandTag = 'MBS';
      else if (brand === 'PGB') brandTag = 'PGB';
      else if (region === 'SG') brandTag = 'MGBSG';
      else brandTag = 'MGBMY';

      // Find existing member or add new
      const existing = MEMBERS.find(m => m.id.toLowerCase() === memberId.toLowerCase());
      if (existing) {
        // Update with VIP list data (more authoritative)
        if (name) existing.name = name;
        existing.brand = brandTag;
        existing.tier  = tier;
        if (totDep > 0) existing.tot  = totDep;
        if (totWd  > 0) existing.totW = totWd;
        updated++;
      } else {
        // Add member from VIP list not yet in dashboard
        const emptyMonths = MONTHS.map(()=>0);
        MEMBERS.push({
          brand: brandTag, id: memberId, name, region, reg:'',
          ftdM:'No Deposit', ftdD:null, ftdA:0,
          a:[...emptyMonths], c:[...emptyMonths], w:[...emptyMonths], wl:[...emptyMonths],
          tot:totDep, totW:totWd, tier
        });
        updated++;
      }
    });

    render();
    _vipWB = null; // reset so next click re-picks file
    if (btn) { btn.textContent = '⟳ Sync VIP List'; btn.disabled = false; }
    document.getElementById('uploadStatus').textContent = '✅ VIP List synced — ' + updated + ' VIP members updated';
  } catch(e) {
    console.error('VIP sync error:', e);
    _vipWB = null;
    if (btn) { btn.textContent = '⟳ Sync VIP List'; btn.disabled = false; }
    document.getElementById('uploadStatus').textContent = '❌ VIP sync failed: ' + e.message;
  }
}

  const tableRows=MONTHS.map((mo,i)=>{
    const dep=m.a[i]||0, wd=(m.w?m.w[i]:0)||0, wl=(m.wl?m.wl[i]:dep)||0;
    if(!dep&&!wd)return'';
    const wlCol=wl>0?'var(--red)':wl<0?'var(--green)':'var(--muted)';
    const wlStr=wl===0?'—':(wl>0?'+':'')+' MYR '+Math.abs(wl).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});

      <td>${ML[i]}</td>

    const bg=i===9?'var(--gold)':i===8?'var(--blue)':'var(--border2)';

  }).join('');

  // Build modal HTML with tabs
  document.getElementById('modal').innerHTML=`
    <div class="modal-head">

      <div class="modal-kpi"><div class="modal-kpi-label">Lifetime Net</div>
        <div class="modal-kpi-val" style="color:${(m.tot-(m.totW||0))>=0?'var(--red)':'var(--green)'}">
          ${(()=>{const n=m.tot-(m.totW||0);return(n>=0?'+':'')+'MYR '+Math.abs(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})})()}
        </div>
      </div>
      <div class="modal-kpi"><div class="modal-kpi-label">${ML[mi]} Deposit</div><div class="modal-kpi-val c-blue">${myr(m.a[mi])}</div></div>
      <div class="modal-kpi"><div class="modal-kpi-label">${ML[mi]} Withdrawal</div><div class="modal-kpi-val" style="color:var(--purple)">${m.w&&m.w[mi]?myr(m.w[mi]):'—'}</div></div>
      <div class="modal-kpi"><div class="modal-kpi-label">FTD</div><div class="modal-kpi-val c-green">${m.ftdA>0?'MYR '+m.ftdA.toLocaleString():'—'} <span style="font-size:11px;color:var(--muted)">${m.ftdD||''}</span></div></div>
    </div>
    <div class="modal-chart">
      <div class="modal-chart-title">10-month deposit history</div>
      <div class="month-bars">${bars}</div>
    </div>
    ${tableRows?`<div style="padding:0 24px 16px"><table class="modal-table"><thead><tr><th>Month</th><th>Deposit</th><th>Tx</th><th style="color:var(--purple)">Withdrawal</th><th>Net (Dep−Wd)</th></tr></thead><tbody>${tableRows}</tbody></table></div>`:''}
    <div class="modal-note ${noteCls}">${noteText}</div>

    <!-- TABS: Overview / Remarks / Contacts / Gifts -->
    <div class="mc-tabs">
      <div class="mc-tab on"  onclick="mcTab(this,'mc-remarks')">📝 Remarks</div>
      <div class="mc-tab"     onclick="mcTab(this,'mc-contacts')">📞 Contact Log</div>
      <div class="mc-tab"     onclick="mcTab(this,'mc-gifts')">🎁 Gifts</div>
    </div>

    <!-- REMARKS -->
    <div id="mc-remarks" class="mc-section">
      <div class="log-feed" id="feed-remarks-${m.id}">
        <div class="log-empty">Loading...</div>
      </div>
      <div class="log-form">
        <div class="log-form-row">
          <input class="log-input" id="inp-remark-${m.id}" placeholder="Add a remark about this member..." />
          <button class="log-submit" onclick="addLog('remark','${m.id}')">Save</button>

    <!-- CONTACTS -->
    <div id="mc-contacts" class="mc-section" style="display:none">
      <div class="log-feed" id="feed-contacts-${m.id}">
        <div class="log-empty">Loading...</div>
      </div>
      <div class="log-form">
        <div class="log-form-row">
          <select class="log-select" id="sel-contact-${m.id}">

          </select>

          <button class="log-submit" onclick="addLog('contact','${m.id}')">Log</button>
        </div>
      </div>
    </div>

    <!-- GIFTS -->
    <div id="mc-gifts" class="mc-section" style="display:none">
      <div class="log-feed" id="feed-gifts-${m.id}">
        <div class="log-empty">Loading...</div>
      </div>
      <div class="log-form">
        <div class="log-form-row">
          <select class="log-select" id="sel-gift-type-${m.id}">
            <option value="Birthday">🎂 Birthday</option>
            <option value="Cash Rebate">💵 Cash Rebate</option>
            <option value="Free Credit">🎰 Free Credit</option>
            <option value="Physical Gift">📦 Physical Gift</option>
            <option value="Voucher">🎫 Voucher</option>
            <option value="Hamper">🧺 Hamper</option>
            <option value="Other">🎁 Other</option>
          </select>
          <input class="log-input" id="inp-gift-val-${m.id}" placeholder="Value (e.g. MYR 500)" style="max-width:140px"/>
          <input class="log-input" id="inp-gift-${m.id}" placeholder="Description / occasion" />
          <button class="log-submit" onclick="addLog('gift','${m.id}')">Add</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  // Load logs from Firebase
  loadLogs(m.id);
  document.getElementById('overlay').classList.add('open');
}

// ── UPLOAD & PARSE ────────────────────────────────────────────
let _memberWB = null, _depositWB = null, _withdrawalWB = null, _reportWB = null, _depositBotWB = null, _withdrawalBotWB = null, _jibetsReportWB = null;

function handleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    if (type === 'member') {
      _memberWB = wb;
      document.getElementById('slotMember').classList.add('ready');
      document.getElementById('iconMember').textContent = '✅';
      document.getElementById('titleMember').textContent = file.name;
      document.getElementById('subMember').textContent = 'Ready';
    } else if (type === 'deposit') {
      _depositWB = wb;
      document.getElementById('slotDeposit').classList.add('ready');
      document.getElementById('iconDeposit').textContent = '✅';
      document.getElementById('titleDeposit').textContent = file.name;
      document.getElementById('subDeposit').textContent = 'Ready';
    } else if (type === 'withdrawal') {
      _withdrawalWB = wb;
      document.getElementById('slotWithdrawal').classList.add('ready');
      document.getElementById('iconWithdrawal').textContent = '✅';
      document.getElementById('titleWithdrawal').textContent = file.name;
      document.getElementById('subWithdrawal').textContent = 'Ready';

      _reportWB = wb;
      document.getElementById('slotReport').classList.add('ready');
      document.getElementById('iconReport').textContent = '✅';

      document.getElementById('subReport').textContent = Object.keys(wb.Sheets).filter(s=>['PGB','MGBMY','MGBSG','MBS','GFW'].includes(s)).join(', ') + ' loaded';
    } else if (type === 'jibetsreport') {
      _jibetsReportWB = wb;
      document.getElementById('slotJibetsReport').classList.add('ready');
      document.getElementById('iconJibetsReport').textContent = '✅';
      document.getElementById('titleJibetsReport').textContent = file.name;
      document.getElementById('subJibetsReport').textContent = 'Ready';
    } else if (type === 'depositbot') {
      _depositBotWB = wb;
      document.getElementById('slotDepositBot').classList.add('ready');
      document.getElementById('iconDepositBot').textContent = '✅';
      document.getElementById('titleDepositBot').textContent = file.name;
      document.getElementById('subDepositBot').textContent = 'Ready';
    } else if (type === 'withdrawalbot') {
      _withdrawalBotWB = wb;
      document.getElementById('slotWithdrawalBot').classList.add('ready');
      document.getElementById('iconWithdrawalBot').textContent = '✅';
      document.getElementById('titleWithdrawalBot').textContent = file.name;
      document.getElementById('subWithdrawalBot').textContent = 'Ready';
    } else if (type === 'jibetsreport') {
      _jibetsReportWB = wb;
      document.getElementById('slotJibetsReport').classList.add('ready');
      document.getElementById('iconJibetsReport').textContent = '✅';
      document.getElementById('titleJibetsReport').textContent = file.name;
      document.getElementById('subJibetsReport').textContent = 'Ready';
    } else if (type === 'depositbot') {
      _depositBotWB = wb;
      document.getElementById('slotDepositBot').classList.add('ready');
      document.getElementById('iconDepositBot').textContent = '✅';
      document.getElementById('titleDepositBot').textContent = file.name;
      document.getElementById('subDepositBot').textContent = 'Ready';
    } else if (type === 'withdrawalbot') {
      _withdrawalBotWB = wb;
      document.getElementById('slotWithdrawalBot').classList.add('ready');
      document.getElementById('iconWithdrawalBot').textContent = '✅';
      document.getElementById('titleWithdrawalBot').textContent = file.name;
      document.getElementById('subWithdrawalBot').textContent = 'Ready';
    }
    const missing = [];
    if (!_depositWB)    missing.push('Deposit');
    if (!_withdrawalWB) missing.push('Withdrawal');
    const extras = [];
    if (_memberWB)  extras.push('Brand 1 members ✅');
    if (_reportWB)  extras.push('Brand 2 report ✅');
    const readyMsg = missing.length === 0
      ? (extras.length ? extras.join(' · ') + ' · Click ⚡ Refresh!' : 'Deposit + Withdrawal ready — Click ⚡ Refresh!')
      : 'Still waiting for: ' + missing.join(', ');
    document.getElementById('uploadStatus').textContent = readyMsg;
  };
  reader.readAsArrayBuffer(file);
}

// ── Persistent stores — survive multiple Refresh clicks ──────
let BOT_BASE = [];

function processFiles() {
  const btn    = document.getElementById('uploadBtn');
  const status = document.getElementById('uploadStatus');

  if (!_depositWB && !_depositBotWB) {
    status.textContent = '⚠️ Upload at least one Deposit file.';
    return;
  }

  btn.textContent = 'Processing...';
  status.textContent = 'Parsing files...';

  try {

    // ── If Player Report uploaded, rebuild BOT_BASE from it ──
    if (_reportWB) {
      BOT_BASE = [];
      const SHEETS = ['MGBMY','MGBSG','MBS','GFW','PGB'];
      SHEETS.forEach(function(sheet) {
        const sh = _reportWB.Sheets[sheet];
        if (!sh) return;
        XLSX.utils.sheet_to_json(sh, {defval:0}).forEach(function(row) {
          const id = String(row['Member ID']||'').trim();
          if (!id) return;
          let reg = '';
          const rr = row['Registration Date'];
          if (rr) {
            const d = rr instanceof Date ? rr : new Date(String(rr));
            if (!isNaN(d.getTime()))
              reg = d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
          }
          const tot  = parseFloat(String(row['Total Deposit Amount']  ||0).replace(/,/g,''))||0;
          const totW = parseFloat(String(row['Total Withdrawal Amount']||0).replace(/,/g,''))||0;
          const name = String(row['Telegram Name']||row['Account Name']||'').trim();
          BOT_BASE.push({
            brand: sheet, id, name,
            region: sheet==='MGBSG'?'SG':'MY',
            reg, ftdM:'No Deposit', ftdD:null, ftdA:0,
            a:[], c:[], w:[], wl:[], tot, totW
          });
        });
      });
    }

    // ── If JIBETS Player Report uploaded, rebuild JIBETS member list ──
    if (_jibetsReportWB) {
      // Parse Detail sheet: member, totalDeposit, totalWithdrawal, memberShip, region
      const sh = _jibetsReportWB.Sheets['Detail'] || _jibetsReportWB.Sheets[_jibetsReportWB.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sh, {defval:0});
      // Update JIBETS_BASE with fresh lifetime totals
      rows.forEach(function(row) {
        const id   = String(row['member']||'').trim();
        if (!id) return;
        const tot  = parseFloat(row['totalDeposit']   ||0)||0;
        const totW = parseFloat(row['totalWithdrawal']||0)||0;
        const name = String(row['member']||'').trim(); // no name col, use ID
        const region = String(row['region']||'').trim();
        const level  = String(row['memberShip']||'').trim();
        // Split JIBETS into MY and SG brands
        const jbrand = (region==='Singapore') ? 'JIBETS_SG' : 'JIBETS_MY';
        const ex = JIBETS_BASE.find(m=>m.id.toLowerCase()===id.toLowerCase());
        if (ex) {
          ex.tot=tot; ex.totW=totW; ex.region=region; ex.brand=jbrand; if(level) ex.level=level;
        } else {
          JIBETS_BASE.push({brand:jbrand,id,name,region,reg:'',ftdM:'No Deposit',ftdD:null,ftdA:0,a:[],c:[],w:[],wl:[],tot,totW,level});
        }
      });
    }

    // ── Build master member list: JIBETS_BASE + BOT_BASE ──
    // Deep copy so originals are never mutated
    const allMembers = [
      ...JIBETS_BASE.map(m=>({...m, a:[...m.a], c:[...m.c], w:[...m.w], wl:[...m.wl]})),
      ...BOT_BASE.map(m=>({...m, a:[], c:[], w:[], wl:[]}))
    ];

    // ── Parse helper functions ──
    function parseTS(ts) {
      if (ts instanceof Date) return ts;
      if (typeof ts==='number') return new Date(Math.round((ts-25569)*86400*1000));
      var s = String(ts).trim();
      // Handle "2026/04/30 11:59:06 PM" → convert slashes and 12h time
      s = s.replace(/(\d{4})\/(\d{2})\/(\d{2})/, '$1-$2-$3');
      // Convert 12-hour AM/PM to 24-hour so new Date() parses correctly
      var pmMatch = s.match(/(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
      if (pmMatch) {
        var h = parseInt(pmMatch[1]), m2 = pmMatch[2], sc = pmMatch[3], ampm = pmMatch[4].toUpperCase();
        if (ampm==='PM' && h!==12) h+=12;
        if (ampm==='AM' && h===12) h=0;
        s = s.replace(pmMatch[0], ('0'+h).slice(-2)+':'+m2+':'+sc);
      }
      return new Date(s);
    }
    function parseDeposits(wb, idCol, tsCol, amtCol) {
      if (!wb) return [];
      return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',cellDates:true})
        .filter(r=>String(r['Status']||'').trim()==='Approved')
        .map(function(r) {
          const id = String(r[idCol]||'').trim().toLowerCase();
          if (!id) return null;
          const amt = parseFloat(String(r[amtCol]||'0').replace(/[^0-9.]/g,''))||0;
          const d   = parseTS(r[tsCol]);
          if (!d||isNaN(d.getTime())) return null;
          const yyyy=d.getFullYear(), mm=('0'+(d.getMonth()+1)).slice(-2), dd=('0'+d.getDate()).slice(-2);
          return {loginId:id, amount:amt, month:yyyy+'-'+mm, date:yyyy+'-'+mm+'-'+dd, ts:d.getTime()};
        }).filter(Boolean);
    }
    function parseWithdrawals(wb, idCol, tsCol) {
      if (!wb) return [];
      return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',cellDates:true})
        .filter(r=>String(r['Status']||'').trim()==='Approved')
        .map(function(r) {
          const id = String(r[idCol]||'').trim().toLowerCase();
          if (!id) return null;
          const amt = parseFloat(String(r['Amount']||'0').replace(/[^0-9.]/g,''))||0;
          const d   = parseTS(r[tsCol]);
          if (!d||isNaN(d.getTime())) return null;
          const yyyy=d.getFullYear(), mm=('0'+(d.getMonth()+1)).slice(-2);
          return {loginId:id, amount:amt, month:yyyy+'-'+mm};
        }).filter(Boolean);
    }

    // Auto-detect format: if file has 'Login ID' = JIBETS format, else BOT format
    function smartParseDeposits(wb) {
      if (!wb) return [];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',cellDates:true});
      if (!rows.length) return [];
      const idCol  = rows[0]['Login ID']  !== undefined ? 'Login ID'   : 'Member ID';
      const tsCol  = rows[0]['Created Timestamp'] !== undefined ? 'Created Timestamp' : 'Created Date Time';
      const amtCol = rows[0]['Confirmed Amount']  !== undefined ? 'Confirmed Amount'  : 'Amount';
      return parseDeposits(wb, idCol, tsCol, amtCol);
    }
    function smartParseWithdrawals(wb) {
      if (!wb) return [];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',cellDates:true});
      if (!rows.length) return [];
      const idCol = rows[0]['Login ID'] !== undefined ? 'Login ID' : 'Member ID';
      const tsCol = rows[0]['Created Timestamp'] !== undefined ? 'Created Timestamp' : 'Created Date Time';
      return parseWithdrawals(wb, idCol, tsCol);
    }

    // JIBETS: Login ID + Confirmed Amount + Created Timestamp
    const jiDeps = parseDeposits(_depositWB,    'Login ID',  'Created Timestamp',  'Confirmed Amount');
    const jiWds  = parseWithdrawals(_withdrawalWB, 'Login ID', 'Created Timestamp');
    // BOT: Member ID + Amount (plain) + Created Date Time
    const botDeps = parseDeposits(_depositBotWB,    'Member ID', 'Created Date Time', 'Amount');
    const botWds  = parseWithdrawals(_withdrawalBotWB, 'Member ID', 'Created Date Time');
    const deposits    = [...jiDeps, ...botDeps];
    const withdrawals = [...jiWds,  ...botWds];

    // Collect months
    const monthSet = {};
    deposits.forEach(d=>{ monthSet[d.month]=true; });
    const newMonths = Object.keys(monthSet).sort();

    if (newMonths.length===0) {
      status.textContent='❌ No approved deposits found.';
      btn.textContent='⚡ Refresh Dashboard'; return;
    }

    // ── Aggregate per member ──
    const agg = {};
    deposits.forEach(function(dep) {
      if (!agg[dep.loginId]) agg[dep.loginId]={ftdTs:dep.ts,ftdDate:dep.date,ftdMonth:dep.month,monthlyAmt:{},monthlyCnt:{},monthlyWd:{},monthlyWL:{},totalAmt:0,totalCnt:0,totalWd:0};
      const a=agg[dep.loginId];
      if (dep.ts<a.ftdTs){a.ftdTs=dep.ts;a.ftdDate=dep.date;a.ftdMonth=dep.month;}
      a.monthlyAmt[dep.month]=(a.monthlyAmt[dep.month]||0)+dep.amount;
      a.monthlyCnt[dep.month]=(a.monthlyCnt[dep.month]||0)+1;
      a.totalAmt+=dep.amount; a.totalCnt+=1;
    });
    withdrawals.forEach(function(wd) {
      if (!agg[wd.loginId]) return;
      const a=agg[wd.loginId];
      a.monthlyWd[wd.month]=(a.monthlyWd[wd.month]||0)+wd.amount;
      a.totalWd+=wd.amount;
    });
    Object.keys(agg).forEach(function(id) {
      const a=agg[id];
      Object.keys({...a.monthlyAmt,...a.monthlyWd}).forEach(function(mo){
        a.monthlyWL[mo]=(a.monthlyAmt[mo]||0)-(a.monthlyWd[mo]||0);
      });
    });
    Object.keys(agg).forEach(function(id) {
      const a=agg[id]; let ftdAmt=0;
      deposits.forEach(function(dep){if(dep.loginId===id&&dep.date===a.ftdDate)ftdAmt+=dep.amount;});
      a.ftdAmount=ftdAmt;
    });

    // ── Apply agg to allMembers ──
    const memberById = {};
    allMembers.forEach(function(m){ memberById[m.id.toLowerCase()]=m; });

    // Add stub for any deposit member not yet in list
    Object.keys(agg).forEach(function(idLower) {
      if (!memberById[idLower]) {
        const stub = {brand:'JIBETS',id:idLower,name:'',region:'',reg:'',ftdM:'No Deposit',ftdD:null,ftdA:0,a:[],c:[],w:[],wl:[],tot:0,totW:0};
        allMembers.push(stub);
        memberById[idLower]=stub;
      }
    });

    // Apply monthly data
    allMembers.forEach(function(m) {
      const a = agg[m.id.toLowerCase()];
      m.a  = newMonths.map(mo=>a?(a.monthlyAmt[mo]||0):0);
      m.c  = newMonths.map(mo=>a?(a.monthlyCnt[mo]||0):0);
      m.w  = newMonths.map(mo=>a?(a.monthlyWd[mo] ||0):0);
      m.wl = newMonths.map(mo=>a?(a.monthlyWL[mo] ||0):0);
      if (a) {
        m.ftdM = a.ftdMonth; m.ftdD = a.ftdDate; m.ftdA = a.ftdAmount;
        // Only override lifetime from deposits if no player report uploaded
        if (m.brand==='JIBETS' && !_jibetsReportWB) { m.tot=a.totalAmt; m.totW=a.totalWd; }
        if (m.brand!=='JIBETS' && !_reportWB)        { m.tot=a.totalAmt; m.totW=a.totalWd; }
      }
    });

    // ── Update globals ──
    MONTHS.length=0; newMonths.forEach(m=>MONTHS.push(m));
    ML.length=0;
    newMonths.forEach(function(m){
      const d=new Date(m+'-01');
      ML.push(d.toLocaleString('en',{month:'short'})+" '"+String(d.getFullYear()).slice(2));
    });
    MEMBERS.length=0;
    const seen=new Set();
    allMembers.forEach(function(m){
      if(!seen.has(m.id.toLowerCase())){seen.add(m.id.toLowerCase());MEMBERS.push(m);}
    });

    selMi=MONTHS.length-1; selYear=null; selBrand='ALL';
    document.querySelectorAll('.bftab').forEach(b=>b.classList.remove('on'));
    const allBtn=document.querySelector('.bftab-all');
    if(allBtn) allBtn.classList.add('on');
    render();

    const jiCount  = MEMBERS.filter(m=>m.brand==='JIBETS').length;
    const botCount = MEMBERS.filter(m=>m.brand!=='JIBETS').length;
    btn.textContent='⚡ Refresh Dashboard';
    status.textContent='✅ '+MEMBERS.length+' members — JIBETS: '+jiCount+' · BOT: '+botCount+' · '+newMonths.length+' months';

  } catch(err) {
    console.error(err);
    status.textContent='❌ Error: '+err.message;
    btn.textContent='⚡ Refresh Dashboard';
  }
}

render();
</script>
</body>
</html>
